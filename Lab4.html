<!DOCTYPE html>
<html>
<head>
    <title>Lab 4 - CSS Types</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS -->
    <style>
        h2 {
            color: green;
            text-align: center;
        }

        .internal-para {
            color: darkblue;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <!-- Inline CSS -->
    <h1 style="color: red; text-align: center;">
        Welcome to Lab 4
    </h1>

    <p style="color: purple; font-size: 20px;">
        This paragraph is styled using Inline CSS.
    </p>

    <!-- Internal CSS Example -->
    <h2>Internal CSS Example</h2>

    <p class="internal-para">
        This paragraph is styled using Internal CSS.
    </p>

    <!-- External CSS Example -->
    <h3>External CSS Example</h3>

    <p class="external-para">
        This paragraph is styled using External CSS.
    </p>

</body>
</html>
